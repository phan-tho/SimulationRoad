# File: mosquitto/config/mosquitto.conf

# --- Cấu hình cơ bản ---
# Cho phép các client kết nối mà không cần xác thực (username/password)
# Rất tiện cho môi trường phát triển cục bộ.
# **LƯU Ý**: Không bao giờ dùng cài đặt này trên môi trường production!
allow_anonymous true

# --- Cấu hình Listener ---
# Mosquitto sẽ lắng nghe trên port 1883 bên trong container
listener 1883

# --- Cấu hình lưu trữ ---
# Đường dẫn đến file lưu trữ dữ liệu (trạng thái các topic, retained messages)
# Đường dẫn này là ở BÊN TRONG container
persistence true
persistence_location /mosquitto/data/

# --- Cấu hình Logging ---
# Ghi log vào file thay vì chỉ xuất ra stdout
log_dest file /mosquitto/log/mosquitto.log
log_type all
